<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linguistic Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1 class="page-title">Linguistic Simulator</h1>
  </header>

  <main class="card-wrapper">
    <div class="card">

      <div class="voice-container" id="voiceContainer" aria-hidden="true">
        <span class="bar" style="--i:0"></span>
        <span class="bar" style="--i:1"></span>
        <span class="bar" style="--i:2"></span>
        <span class="bar" style="--i:3"></span>
        <span class="bar" style="--i:4"></span>
        <span class="bar" style="--i:5"></span>
        <span class="bar" style="--i:6"></span>
        <span class="bar" style="--i:7"></span>
        <span class="bar" style="--i:8"></span>
        <span class="bar" style="--i:9"></span>
        <span class="bar" style="--i:10"></span>
        <span class="bar" style="--i:11"></span>
      </div>

      <p class="status-text" id="statusText">
        Select a mode and type a sentence to see your language transform.
      </p>

      <div class="mode-panel" id="modePanel" aria-hidden="true" role="listbox" aria-label="Select language mode">
        <p class="mode-panel-label">Choose a register</p>

        <button class="mode-option" data-mode="academic" role="option" aria-selected="false">
          <span class="mode-option-info">
            <span class="mode-option-name">Academic</span>
            <span class="mode-option-desc">Formal, hedged, precise — professors and essays</span>
          </span>
        </button>

        <button class="mode-option" data-mode="casual" role="option" aria-selected="false">
          <span class="mode-option-info">
            <span class="mode-option-name">Casual</span>
            <span class="mode-option-desc">Relaxed American English</span>
          </span>
        </button>

        <button class="mode-option" data-mode="texting" role="option" aria-selected="false">
          <span class="mode-option-info">
            <span class="mode-option-name">Texting</span>
            <span class="mode-option-desc">Quick texts, abbreviations, internet shorthand</span>
          </span>
        </button>

        <button class="mode-option" data-mode="email" role="option" aria-selected="false">
          <span class="mode-option-info">
            <span class="mode-option-name">Formal Email</span>
            <span class="mode-option-desc">Professional English</span>
          </span>
        </button>
      </div>

      <div class="voice-panel" id="voicePanel" aria-hidden="true" role="dialog" aria-label="Select voice accent">
        <p class="mode-panel-label">Choose a voice</p>
        <div class="voice-list" id="voiceList">
          <p class="voice-loading">Loading available voices…</p>
        </div>
      </div>

      <div class="input-box">
        <textarea
          id="userInput"
          class="text-input"
          rows="2"
          placeholder="Type a sentence here…"
          aria-label="Sentence to transform"
        ></textarea>

        <div class="input-actions">

          <button class="action-btn" id="modeBtn" aria-haspopup="listbox" aria-expanded="false" aria-controls="modePanel" aria-label="Select context mode">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
              <rect x="8" y="1" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
              <rect x="1" y="8" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
              <rect x="8" y="8" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/>
            </svg>
            <span id="modeBtnLabel">Mode</span>
          </button>

          <button class="action-btn" id="voiceBtn" aria-haspopup="dialog" aria-expanded="false" aria-controls="voicePanel" aria-label="Select voice">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M7 1.5C5.5 3 4.5 5 4.5 7s1 4 2.5 5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M7 1.5C8.5 3 9.5 5 9.5 7s-1 4-2.5 5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="1.5" y1="7" x2="12.5" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <span id="voiceBtnLabel">Voice</span>
          </button>

          <div class="spacer"></div>

          <button class="action-btn icon-only" id="micBtn" aria-label="Play audio">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="4.5" y="1" width="5" height="7" rx="2.5" fill="currentColor"/>
              <path d="M1.5 7.5A5.5 5.5 0 0012.5 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="7" y1="13" x2="7" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>

          <button class="submit-btn" id="transformBtn" aria-label="Transform sentence">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M2 7H12M12 7L8 3M12 7L8 11" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

        </div>
      </div>

    </div>
  </main>

  <footer class="page-caption">
    <p>A linguistic autobiography — <em>how context shapes the way I speak American English.</em></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
