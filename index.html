<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linguistic Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PAGE TITLE -->
  <header class="page-header">
    <h1 class="page-title">Linguistic Simulator</h1>
  </header>

  <!-- MAIN CARD -->
  <main class="card-wrapper">
    <div class="card">

      <!-- PULSING ORB -->
      <div class="orb-container" id="orbContainer">
        <div class="orb" id="orb"></div>
      </div>

      <!-- STATUS TEXT -->
      <p class="status-text" id="statusText">
        Select a mode and type a sentence to see your language transform.
      </p>

      <!-- MODE PICKER PANEL (hidden by default, toggled by Mode button) -->
      <div class="mode-panel" id="modePanel" aria-hidden="true" role="listbox" aria-label="Select language mode">
        <p class="mode-panel-label">Choose a register</p>

        <button class="mode-option" data-mode="academic" role="option" aria-selected="false">
          <span class="mode-option-icon"></span>
          <span class="mode-option-info">
            <span class="mode-option-name">Academic</span>
            <span class="mode-option-desc">Formal</span>
          </span>
        </button>

        <button class="mode-option" data-mode="casual" role="option" aria-selected="false">
          <span class="mode-option-icon"></span>
          <span class="mode-option-info">
            <span class="mode-option-name">Casual</span>
            <span class="mode-option-desc">Everyday english</span>
          </span>
        </button>

        <button class="mode-option" data-ode="family" role="option" aria-selected="false">
          <span class="mode-option-icon"></span>
          <span class="mode-option-info">
            <span class="mode-option-name">Family</span>
            <span class="mode-option-desc">English · Français · Twi</span>
          </span>
        </button>

        <button class="mode-option" data-mode="email" role="option" aria-selected="false">
          <span class="mode-option-icon"></span>
          <span class="mode-option-info">
            <span class="mode-option-name">Formal Email</span>
            <span class="mode-option-desc">Professional</span>
          </span>
        </button>
      </div>

      <!-- INPUT BOX -->
      <div class="input-box">
        <textarea
          id="userInput"
          class="text-input"
          rows="2"
          placeholder="Type a sentence here…"
          aria-label="Sentence to transform"
        ></textarea>

        <div class="input-actions">

          <button class="action-btn" id="modeBtn" aria-haspopup="listbox" aria-expanded="false" aria-controls="modePanel" aria-label="Select context mode">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
              <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
              <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
              <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
            </svg>
            <span id="modeBtnLabel">Mode</span>
          </button>

          <div class="spacer"></div>

          <button class="action-btn icon-only" id="micBtn" aria-label="Speak input">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="5.5" y="1" width="5" height="8" rx="2.5" fill="currentColor"/>
              <path d="M2 8.5A6 6 0 0014 8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="8" y1="14.5" x2="8" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>

          <button class="submit-btn" id="transformBtn" aria-label="Transform sentence">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

        </div>
      </div>

    </div>
  </main>

  <!-- CAPTION -->
  <footer class="page-caption">
    <p>A linguistic autobiography — <em>how context shapes the way I speak American English.</em></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
